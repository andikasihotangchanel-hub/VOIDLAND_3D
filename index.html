<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VOIDLAND 3D</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
  background: black;
}canvas { display: block; }

#ui { position: fixed; inset: 0; pointer-events: none; }

#crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 25px; }

#eventText { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: white; font-size: 22px; font-weight: bold; text-shadow: 0 0 10px black; }

#joystickBase { position: fixed; left: 30px; bottom: 30px; width: 130px; height: 130px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 3px solid rgba(255,255,255,0.25); pointer-events: auto; }

#joystickStick { position: absolute; left: 35px; top: 35px; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.5); }

.btn { position: fixed; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 3px solid rgba(255,255,255,0.3); color: white; font-size: 18px; font-weight: bold; pointer-events: auto; }

#jumpBtn { right: 30px; bottom: 140px; }

#pickupBtn { right: 30px; bottom: 40px; }

#inventory { position: fixed; top: 20px; right: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }

#hotbar{
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: grid;
  grid-template-columns: repeat(4,70px);
  gap: 10px;
  pointer-events: auto;
}

.slot{
  width: 70px;
  height: 70px;
  background: rgba(0,0,0,0.6);
  border: 3px solid white;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  border-radius: 10px;
}

.selected{
  border: 3px solid yellow;
}
  
</style>

</head>
<body><div id="ui">
  <div id="crosshair">+</div>
  <div id="eventText">Menjelajah VOIDLAND...</div>  <div id="inventory">
    Kayu: <span id="woodCount">0</span>
  </div>  <div id="joystickBase">
    <div id="joystickStick"></div>
  </div><button class="btn" id="jumpBtn">↑</button> <button class="btn" id="pickupBtn">Ambil</button>

<div id="hotbar"></div>

</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 20, 100);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
  const raycaster = new THREE.Raycaster();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

scene.add(new THREE.AmbientLight(0x888888));

// Ground
const ground = new THREE.Mesh(
  new THREE.BoxGeometry(200, 1, 200),
  new THREE.MeshLambertMaterial({ color: 0x225522 })
);
ground.position.y = -1;
scene.add(ground);

  // Wood Items
const woods = [];
const blocks = [];
const inventory = [];
let selectedItem = null;


// Trees
for (let i = 0; i < 40; i++) {
  const trunk = new THREE.Mesh(
    new THREE.BoxGeometry(1, 4, 1),
    new THREE.MeshLambertMaterial({ color: 0x5b3a1a })
  );

  trunk.position.set(
    (Math.random() - 0.5) * 150,
    1,
    (Math.random() - 0.5) * 150
  );

  scene.add(trunk);

blocks.push(trunk);

trunk.userData.type = "Kayu";

  const leaves = new THREE.Mesh(
    new THREE.BoxGeometry(3, 3, 3),
    new THREE.MeshLambertMaterial({ color: 0x228833 })
  );

  leaves.position.set(trunk.position.x, 4, trunk.position.z);
  scene.add(leaves);
}

// Wood Items

const hotbar = document.getElementById("hotbar");

function updateHotbar(){

  hotbar.innerHTML = "";

  for(let i = 0; i < 4; i++){

    const slot = document.createElement("div");
    slot.className = "slot";

    const item = inventory[i];

    if(item){

      slot.innerText = item;

      if(selectedItem === item){
        slot.classList.add("selected");
      }

      slot.onclick = () => {
        selectedItem = item;
        updateHotbar();
      };

    }

    hotbar.appendChild(slot);

  }

}

for (let i = 0; i < 15; i++) {
  const wood = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),
    new THREE.MeshLambertMaterial({ color: 0xaa7744 })
  );

  wood.position.set(
    (Math.random() - 0.5) * 80,
    0,
    (Math.random() - 0.5) * 80
  );

  wood.userData.collectable = true;

  scene.add(wood);
  woods.push(wood);
  
  blocks.push(wood);
wood.userData.type = "Kayu";
}

// Monster
const monster = new THREE.Mesh(
  new THREE.BoxGeometry(2, 3, 2),
  new THREE.MeshLambertMaterial({ color: 0xff0000 })
);
monster.position.set(10, 1, 10);
scene.add(monster);

// Player
const player = {
  x: 0,
  y: 1.5,
  z: 5,
  velY: 0,
  grounded: false,
  wood: 0
};

camera.position.set(player.x, player.y, player.z);

// Joystick
const joystickBase = document.getElementById('joystickBase');
const joystickStick = document.getElementById('joystickStick');

let joyX = 0;
let joyY = 0;

let dragging = false;

joystickBase.addEventListener('touchstart', () => {
  dragging = true;
});

window.addEventListener('touchend', () => {
  dragging = false;
  joyX = 0;
  joyY = 0;
  joystickStick.style.left = '35px';
  joystickStick.style.top = '35px';
});

window.addEventListener('touchmove', (e) => {
  if (!dragging) return;

  const touch = e.touches[0];
  const rect = joystickBase.getBoundingClientRect();

  const x = touch.clientX - rect.left - 65;
  const y = touch.clientY - rect.top - 65;

  const dist = Math.min(40, Math.sqrt(x*x + y*y));
  const angle = Math.atan2(y, x);

  joyX = Math.cos(angle) * (dist / 40);
  joyY = Math.sin(angle) * (dist / 40);

  joystickStick.style.left = `${35 + joyX * 40}px`;
  joystickStick.style.top = `${35 + joyY * 40}px`;
});

// Jump
const jumpBtn = document.getElementById('jumpBtn');

  const pickupBtn = document.getElementById('pickupBtn');

jumpBtn.addEventListener('touchstart', () => {
  if (player.grounded) {
    player.velY = 0.22;
    player.grounded = false;
  }
});

// Pickup
pickupBtn.addEventListener("touchstart", () => {

  let closestBlock = null;
  let closestDistance = 999;

  blocks.forEach((block) => {

    const distance = camera.position.distanceTo(block.position);

    if(distance < 5){

      // Cek arah depan kamera
      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);

      const toBlock = new THREE.Vector3(
        block.position.x - camera.position.x,
        block.position.y - camera.position.y,
        block.position.z - camera.position.z
      ).normalize();

      const dot = dir.dot(toBlock);

      // Harus menghadap block
      if(dot > 0.8){

        if(distance < closestDistance){

          closestDistance = distance;
          closestBlock = block;

        }

      }

    }

  });

  if(closestBlock){

    scene.remove(closestBlock);

    inventory.push(
      closestBlock.userData.type
    );

    updateHotbar();

    const index = blocks.indexOf(closestBlock);

    if(index > -1){

      blocks.splice(index,1);

    }

  }

});

// Random Events
const eventText = document.getElementById('eventText');

const events = [
  {
    name: '🌙 Blood Moon',
    action: () => {
      scene.fog.color.set(0x550000);
      monster.material.color.set(0xff0000);
    }
  },
  {
    name: '☁ Kabut Misterius',
    action: () => {
      scene.fog.color.set(0x777777);
    }
  },
  {
    name: '🌍 Gempa!',
    action: () => {
      camera.position.x += (Math.random() - 0.5) * 2;
    }
  },
  {
    name: '✨ Supply Drop',
    action: () => {
      const wood = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        new THREE.MeshLambertMaterial({ color: 0xffff00 })
      );

      wood.position.set(
        player.x + 5,
        0,
        player.z + 5
      );

      wood.userData.collectable = true;

      scene.add(wood);
      woods.push(wood);
    }
  }
];

setInterval(() => {
  const event = events[Math.floor(Math.random() * events.length)];

  eventText.innerText = event.name;
  event.action();

  setTimeout(() => {
    eventText.innerText = 'Menjelajah VOIDLAND...';
    scene.fog.color.set(0x000000);
  }, 7000);

}, 15000);

// Touch look
let lastTouchX = null;

window.addEventListener('touchmove', (e) => {
  if (e.touches.length < 2) return;

  const touch = e.touches[1];

  if (lastTouchX !== null) {
    const delta = touch.clientX - lastTouchX;
    camera.rotation.y -= delta * 0.005;
  }

  lastTouchX = touch.clientX;
});

window.addEventListener('touchend', () => {
  lastTouchX = null;
});

  // CAMERA TOUCH LOOK

let lookTouchId = null;
let lastLookX = 0;
let lastLookY = 0;

let cameraYaw = 0;
let cameraPitch = 0;

window.addEventListener("touchstart", (e) => {

  for (let touch of e.touches) {

    // Jangan ganggu joystick
    if (touch.clientX > window.innerWidth / 2) {

      lookTouchId = touch.identifier;
      lastLookX = touch.clientX;
      lastLookY = touch.clientY;

    }

  }

});

window.addEventListener("touchmove", (e) => {

  for (let touch of e.touches) {

    if (touch.identifier === lookTouchId) {

      const deltaX = touch.clientX - lastLookX;
      const deltaY = touch.clientY - lastLookY;

      cameraYaw -= deltaX * 0.003;
      cameraPitch -= deltaY * 0.003;

      // Batas lihat atas bawah
      cameraPitch = Math.max(
        -1.2,
        Math.min(1.2, cameraPitch)
      );

      lastLookX = touch.clientX;
      lastLookY = touch.clientY;

    }

  }

});

window.addEventListener("touchend", (e) => {

  for (let touch of e.changedTouches) {

    if (touch.identifier === lookTouchId) {

      lookTouchId = null;

    }

  }

});

  let targetFov = 75;

  window.addEventListener("dblclick", () => {

  if(!selectedItem) return;

  raycaster.setFromCamera(
    new THREE.Vector2(0,0),
    camera
  );

  const intersects = raycaster.intersectObject(ground);

  if(intersects.length > 0){

    const point = intersects[0].point;

    let block;

    if(selectedItem === "Kayu"){

      block = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        new THREE.MeshLambertMaterial({
          color: 0xaa7744
        })
      );

      block.userData.type = "Kayu";

    }

    block.position.set(
      Math.round(point.x),
      0,
      Math.round(point.z)
    );

    scene.add(block);

    blocks.push(block);

  }

});

function animate() {
  requestAnimationFrame(animate);

  const speed = 0.12;

  camera.fov += (targetFov - camera.fov) * 0.1;
camera.updateProjectionMatrix();

  const forwardX = Math.sin(cameraYaw);
const forwardZ = Math.cos(cameraYaw);

  // Movement Fixed

player.x += (forwardX * joyY + forwardZ * joyX) * speed;
player.z += (forwardZ * joyY - forwardX * joyX) * speed;

  // Gravity
  player.velY -= 0.01;
  player.y += player.velY;

  if (player.y <= 2) {
    player.y = 2;
    player.velY = 0;
    player.grounded = true;
  }

  // Monster AI
  const dx = player.x - monster.position.x;
  const dz = player.z - monster.position.z;

  const dist = Math.sqrt(dx*dx + dz*dz);

  if (dist < 30) {
    monster.position.x += dx * 0.003;
    monster.position.z += dz * 0.003;
  }

  camera.position.set(player.x, player.y, player.z);

  // Smooth Camera

camera.rotation.order = "YXZ";

camera.rotation.y += (cameraYaw - camera.rotation.y) * 0.15;
camera.rotation.x += (cameraPitch - camera.rotation.x) * 0.15;

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>
</body>
</html>
