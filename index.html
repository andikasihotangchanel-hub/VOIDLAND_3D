<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ROOFTOP SURVIVAL</title>

<style>

body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

canvas{
  display:block;
}

#ui{
  position:fixed;
  inset:0;
  pointer-events:none;
}

#crosshair{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:28px;
  font-weight:bold;
}

#info{
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  background:rgba(0,0,0,.5);
  padding:10px;
  border-radius:10px;
}

#eventText{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:22px;
  font-weight:bold;
}

#joystickBase{
  position:fixed;
  left:30px;
  bottom:30px;
  width:130px;
  height:130px;
  border-radius:50%;
  background:rgba(255,255,255,.15);
  border:3px solid rgba(255,255,255,.3);
  pointer-events:auto;
}

#joystickStick{
  position:absolute;
  left:35px;
  top:35px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:rgba(255,255,255,.5);
}

.btn{
  position:fixed;
  width:80px;
  height:80px;
  border-radius:50%;
  background:rgba(255,255,255,.2);
  border:3px solid rgba(255,255,255,.3);
  color:white;
  font-weight:bold;
  pointer-events:auto;
}

#jumpBtn{
  right:30px;
  bottom:240px;
}

#shootBtn{
  right:30px;
  bottom:140px;
}

#pickupBtn{
  right:30px;
  bottom:40px;
}

#weaponBox{
  position:absolute;
  right:20px;
  top:20px;
  color:white;
  background:rgba(0,0,0,.5);
  padding:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<div id="ui">

<div id="crosshair">+</div>

<div id="eventText">
Cari peti senjata!
</div>

<div id="info">
HP: <span id="hpText">100</span><br>
Zombie: <span id="zombieText">0</span>
</div>

<div id="weaponBox">
Senjata:
<span id="weaponText">
Tidak Ada
</span>
</div>

<div id="joystickBase">
<div id="joystickStick"></div>
</div>

<button class="btn" id="jumpBtn">
↑
</button>

<button class="btn" id="shootBtn">
TEMBAK
</button>

<button class="btn" id="pickupBtn">
AMBIL
</button>

</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth / window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(
renderer.domElement
);

// Cahaya
const sun = new THREE.DirectionalLight(
0xffffff,
1.2
);

sun.position.set(20,30,10);

scene.add(sun);

scene.add(
new THREE.AmbientLight(
0xffffff,
0.7
)
);

// DATA GAME
const blocks = [];
const zombies = [];

let playerHP = 100;
let currentWeapon = "Tidak Ada";

document.getElementById(
"hpText"
).innerText = playerHP;

document.getElementById(
"weaponText"
).innerText = currentWeapon;

// PLAYER
const player = {
x:0,
y:3,
z:0,
velY:0,
grounded:false
};

camera.position.set(
player.x,
player.y,
player.z
);

// ROOFTOP BESAR

const rooftop = new THREE.Mesh(
new THREE.BoxGeometry(
80,
2,
80
),
new THREE.MeshLambertMaterial({
color:0x666666
})
);

rooftop.position.y = -1;

scene.add(rooftop);

// TEMPAT SEMBUNYI

for(let i=0;i<20;i++){

const wall = new THREE.Mesh(
new THREE.BoxGeometry(
4,
4,
1
),
new THREE.MeshLambertMaterial({
color:0x444444
})
);

wall.position.set(
(Math.random()-0.5)*60,
1,
(Math.random()-0.5)*60
);

scene.add(wall);

blocks.push(wall);

}

// PETI SENJATA

const weaponChests = [];

const chestCount =
Math.floor(
Math.random()*3
)+3;

for(let i=0;i<chestCount;i++){

const chest = new THREE.Mesh(
new THREE.BoxGeometry(
2,
2,
2
),
new THREE.MeshLambertMaterial({
color:0xffff00
})
);

chest.position.set(
(Math.random()-0.5)*60,
1,
(Math.random()-0.5)*60
);

chest.userData.weaponChest = true;

scene.add(chest);

weaponChests.push(chest);
blocks.push(chest);

}

// JOYSTICK

const joystickBase =
document.getElementById(
'joystickBase'
);

const joystickStick =
document.getElementById(
'joystickStick'
);

let joyX = 0;
let joyY = 0;
let dragging = false;

  // JOYSTICK

joystickBase.addEventListener("touchstart", () => {
  dragging = true;
});

window.addEventListener("touchend", () => {

  dragging = false;

  joyX = 0;
  joyY = 0;

  joystickStick.style.left = "35px";
  joystickStick.style.top = "35px";

});

window.addEventListener("touchmove", (e) => {

  if(!dragging) return;

  const touch = e.touches[0];

  const rect =
  joystickBase.getBoundingClientRect();

  const x =
  touch.clientX - rect.left - 65;

  const y =
  touch.clientY - rect.top - 65;

  const dist = Math.min(
    40,
    Math.sqrt(x*x+y*y)
  );

  const angle =
  Math.atan2(y,x);

  joyX =
  Math.cos(angle)*(dist/40);

  joyY =
  Math.sin(angle)*(dist/40);

  joystickStick.style.left =
  `${35+joyX*40}px`;

  joystickStick.style.top =
  `${35+joyY*40}px`;

});

// LOMPAT

const jumpBtn =
document.getElementById(
"jumpBtn"
);

jumpBtn.addEventListener(
"touchstart",
() => {

  if(player.grounded){

    player.velY = 0.22;
    player.grounded = false;

  }

});

// KAMERA SENTUH

let cameraYaw = 0;
let cameraPitch = 0;

let lookTouchId = null;

let lastLookX = 0;
let lastLookY = 0;

window.addEventListener(
"touchstart",
(e)=>{

for(let touch of e.touches){

if(
touch.clientX >
window.innerWidth/2
){

lookTouchId =
touch.identifier;

lastLookX =
touch.clientX;

lastLookY =
touch.clientY;

}

}

});

window.addEventListener(
"touchmove",
(e)=>{

for(let touch of e.touches){

if(
touch.identifier ===
lookTouchId
){

const deltaX =
touch.clientX -
lastLookX;

const deltaY =
touch.clientY -
lastLookY;

cameraYaw -=
deltaX * 0.003;

cameraPitch -=
deltaY * 0.003;

cameraPitch =
Math.max(
-1.2,
Math.min(
1.2,
cameraPitch
)
);

lastLookX =
touch.clientX;

lastLookY =
touch.clientY;

}

}

});

window.addEventListener(
"touchend",
(e)=>{

for(let touch of
e.changedTouches){

if(
touch.identifier ===
lookTouchId
){

lookTouchId = null;

}

}

});

  // PETI SENJATA

const pickupBtn =
document.getElementById(
"pickupBtn"
);

pickupBtn.addEventListener(
"touchstart",
() => {

let closestChest = null;
let closestDistance = 999;

weaponChests.forEach(
(chest)=>{

const distance =
camera.position.distanceTo(
chest.position
);

if(distance < 5){

if(distance <
closestDistance){

closestDistance =
distance;

closestChest =
chest;

}

}

});

if(closestChest){

const random =
Math.random();

if(random < 0.6){

currentWeapon =
"Pistol";

}
else if(random < 0.9){

currentWeapon =
"AK47";

}
else{

currentWeapon =
"GROZA";

}

document.getElementById(
"weaponText"
).innerText =
currentWeapon;

scene.remove(
closestChest
);

const index =
weaponChests.indexOf(
closestChest
);

if(index > -1){

weaponChests.splice(
index,
1
);

}

}

});

const shootBtn =
document.getElementById(
"shootBtn"
);

shootBtn.addEventListener(
"touchstart",
() => {

if(
currentWeapon ===
"Tidak Ada"
) return;

eventText.innerText =
"🔫 Menembak!";

setTimeout(()=>{

eventText.innerText =
"Cari peti senjata!";

},1000);

});  

</script>
</body>
</html>
